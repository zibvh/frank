name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias frankx \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass frankxpass \
            -keypass frankxpass \
            -dname "CN=FrankX, OU=Game, O=FrankX, L=Unknown, ST=Unknown, C=US"

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks android/app/release.keystore \
            --ks-pass pass:frankxpass \
            --ks-key-alias frankx \
            --key-pass pass:frankxpass \
            --out frank-x.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frank-x-apk
          path: frank-x.apk
          retention-days: 30
